{% extends 'base.html' %}

{% block content %}
<div style="direction: rtl; padding: 25px; font-family: 'Tajawal', sans-serif;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="color: #1e293b; margin: 0;">🌐 مركز توليد البيانات (API)</h2>
        <span style="background: #dcfce7; color: #166534; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;">متصل بالشيرفر آلياً</span>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
        
        <div style="background: #1e1e1e; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px;">
                <h4 style="color: #4ade80; margin: 0;">👶 بيانات الأيتام (JSON)</h4>
                <code style="color: #64748b;">GET /api/orphans/</code>
            </div>
            <pre style="color: #d1d5db; background: #111; padding: 15px; border-radius: 8px; height: 350px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.9rem; line-height: 1.5;">{{ orphans_json }}</pre>
        </div>

        <div style="background: #1e1e1e; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px;">
                <h4 style="color: #60a5fa; margin: 0;">🎁 بيانات التبرعات (JSON)</h4>
                <code style="color: #64748b;">GET /api/donations/</code>
            </div>
            <pre style="color: #d1d5db; background: #111; padding: 15px; border-radius: 8px; height: 350px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.9rem; line-height: 1.5;">{{ donations_json }}</pre>
        </div>

    </div>
</div>
{% endblock %}
