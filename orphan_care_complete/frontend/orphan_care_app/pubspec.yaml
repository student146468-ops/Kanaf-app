name: kanaf
description: تطبيق كنف
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 🔌 مكتبات الربط والاتصال بالـ API
  dio: ^5.3.0
  http: ^1.1.0
  
  # 📦 إدارة الحالة والبيانات
  provider: ^6.0.0
  flutter_bloc: ^8.1.0
  bloc: ^8.1.0
  
  # 💾 التخزين المحلي
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  
  # 🎨 الأيقونات والتصميم
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.0
  
  # 📊 الرسوم البيانية والإحصائيات
  fl_chart: ^0.63.0
  
  # 🔔 الإشعارات
  flutter_local_notifications: 17.2.4
  
  # 🌐 التوطين (Localization)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/logo.png
    - assets/images/child.png
    - assets/images/apple_icon.png
    - assets/images/google_icon.png
    - assets/images/happy_child.png    
    - assets/images/
  
  # الخطوط العربية الاحترافية
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo.ttf
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
